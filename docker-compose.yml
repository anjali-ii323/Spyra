version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: spyra-postgres
    restart: always
    environment:
      POSTGRES_USER: spyra
      POSTGRES_PASSWORD: spyra_password
      POSTGRES_DB: spyra_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
